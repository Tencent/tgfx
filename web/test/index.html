<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TGFX Web Test</title>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
</head>
<body>
    <canvas id="tgfx-test-canvas" width="1024" height="1024" style="display: none;"></canvas>
    <script type="module">
        import TGFXTest from './tgfx-test.js';
        import { TGFXBind } from './tgfx.esm.js';

        function collectFiles(fs, dir) {
            const files = [];
            for (const name of fs.readdir(dir)) {
                if (name === '.' || name === '..') continue;
                const fullPath = dir + '/' + name;
                const stat = fs.stat(fullPath);
                if (fs.isDir(stat.mode)) {
                    files.push(...collectFiles(fs, fullPath));
                } else {
                    files.push(fullPath);
                }
            }
            return files;
        }

        async function downloadOutputDir(fs, dir, zipName) {
            try {
                fs.stat(dir);
            } catch (e) {
                console.warn(`No ${dir} directory found, skipping download.`);
                return;
            }
            const files = collectFiles(fs, dir);
            if (files.length === 0) {
                console.warn(`No output files found in ${dir}.`);
                return;
            }
            console.log(`Packing ${files.length} files from ${dir} into ${zipName}...`);
            const zip = new JSZip();
            const prefix = dir.endsWith('/') ? dir : dir + '/';
            for (const filePath of files) {
                const data = fs.readFile(filePath);
                const relativePath = filePath.replace(prefix, '');
                zip.file(relativePath, data);
            }
            const blob = await zip.generateAsync({type: 'blob'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = zipName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            console.log(`Download started: ${zipName}`);
        }

        const module = await TGFXTest();
        TGFXBind(module);
        // Patch missing setColorSpace (tgfx.esm.js is out of date with tgfx.ts source).
        if (!module.tgfx.setColorSpace) {
            module.tgfx.setColorSpace = (GL, colorSpace) => {
                const gl = GL.currentContext?.GLctx;
                if (!gl) return false;
                if ('drawingBufferColorSpace' in gl) {
                    gl.drawingBufferColorSpace = colorSpace <= 1 ? 'srgb' : 'display-p3';
                    return true;
                }
                return colorSpace <= 1;
            };
        }
        const result = module.ccall('RunAllTests', 'number', [], []);
        console.log('All tests finished with exit code:', result);
        await downloadOutputDir(module.FS, '/test/baseline-out', 'baseline-out.zip');
        await downloadOutputDir(module.FS, '/test/out', 'test-out.zip');
        // Pack md5.json and version.json from baseline-out as cache-web.zip for reuse.
        // Extract this zip into test/baseline/.cache-web/ to enable baseline comparison.
        try {
            const cacheZip = new JSZip();
            const baselineOut = '/test/baseline-out';
            for (const name of ['md5.json', 'version.json']) {
                try {
                    const data = module.FS.readFile(baselineOut + '/' + name);
                    cacheZip.file(name, data);
                } catch (e) { /* file may not exist */ }
            }
            if (Object.keys(cacheZip.files).length > 0) {
                const blob = await cacheZip.generateAsync({type: 'blob'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'cache-web.zip';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                console.log('Download started: cache-web.zip');
            }
        } catch (e) {
            console.warn('Failed to create cache-web.zip:', e);
        }
    </script>
</body>
</html>
