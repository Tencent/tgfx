name: autotest

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  mac:
    # the macos-latest may randomly give us macos-12.6.9 or macos-12.7.0 which may break the autotest.
    runs-on: macos-14
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Get Third-Party Cache
        id: third-party-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            third_party
            test/baseline/.cache
          key: third-party-autotest-${{ hashFiles('DEPS') }}-${{ hashFiles('vendor.json') }}-${{ hashFiles('test/baseline/version.json') }}
          restore-keys: third-party-autotest-

      - uses: tecolicom/actions-use-homebrew-tools@v1
        with:
          tools: ninja yasm gcovr

      - name: Run depsync
        run: |
          npm install depsync -g
          depsync
        shell: bash

      - name: Check Code Format
        run: |
          chmod +x codeformat.sh
          ./codeformat.sh
        shell: bash

      - name: Run Autotest
        run: |
          chmod +x autotest.sh
          ./autotest.sh USE_SWIFTSHADER
        env:
          TRACY_NO_INVARIANT_CHECK: 1

      - name: Run Codecov
        run: |
          chmod +x codecov.sh
          ./codecov.sh

      - name: Upload Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: result/coverage.xml

      - name: Save Third-Party Cache
        if: ${{ (github.event_name == 'push') && (steps.third-party-cache.outputs.cache-hit != 'true') }}
        uses: actions/cache/save@v4
        with:
          path: |
            third_party
            test/baseline/.cache
          key: third-party-autotest-${{ hashFiles('DEPS') }}-${{ hashFiles('vendor.json') }}-${{ hashFiles('test/baseline/version.json') }}

      - name: Job Failed
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: result
          path: result

      - uses: actions/upload-artifact@v4
        with:
          name: result
          path: result

  win-opengl:
    name: win (opengl)
    runs-on: windows-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Get Third-Party Cache
        id: third-party-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            third_party
            test/baseline/.cache
          key: third-party-autotest-win-${{ hashFiles('DEPS') }}-${{ hashFiles('vendor.json') }}-${{ hashFiles('test/baseline/version.json') }}
          restore-keys: third-party-autotest-win-

      - name: Run depsync
        run: |
          npm install depsync -g
          depsync
        shell: bash

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Check Code Format
        run: codeformat.bat
        shell: cmd

      - name: Run Autotest
        run: autotest.bat USE_SWIFTSHADER
        shell: cmd
        env:
          TRACY_NO_INVARIANT_CHECK: 1

      - name: Save Third-Party Cache
        if: ${{ (github.event_name == 'push') && (steps.third-party-cache.outputs.cache-hit != 'true') }}
        uses: actions/cache/save@v4
        with:
          path: |
            third_party
            test/baseline/.cache
          key: third-party-autotest-win-${{ hashFiles('DEPS') }}-${{ hashFiles('vendor.json') }}-${{ hashFiles('test/baseline/version.json') }}

      - name: Job Failed
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: win_opengl_result
          path: result

      - uses: actions/upload-artifact@v4
        with:
          name: win_opengl_result
          path: result

  win-vulkan:
    name: win (vulkan)
    runs-on: windows-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Get Third-Party Cache
        id: third-party-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            third_party
            test/baseline/.cache
          key: third-party-autotest-win-vk-${{ hashFiles('DEPS') }}-${{ hashFiles('vendor.json') }}-${{ hashFiles('test/baseline/version.json') }}
          restore-keys: third-party-autotest-win-vk-

      - name: Run depsync
        run: |
          npm install depsync -g
          depsync
        shell: bash

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Install Vulkan SDK
        uses: NcStudios/VulkanCI@v1.2

      - name: Run Autotest
        run: autotest.bat USE_VULKAN_SWIFTSHADER
        shell: cmd
        env:
          TRACY_NO_INVARIANT_CHECK: 1
          VK_ICD_FILENAMES: ${{ github.workspace }}\vendor\swiftshader\win\x64\vk_swiftshader_icd.json
          VK_DRIVER_FILES: ${{ github.workspace }}\vendor\swiftshader\win\x64\vk_swiftshader_icd.json

      - name: Save Third-Party Cache
        if: ${{ (github.event_name == 'push') && (steps.third-party-cache.outputs.cache-hit != 'true') }}
        uses: actions/cache/save@v4
        with:
          path: |
            third_party
            test/baseline/.cache
          key: third-party-autotest-win-vk-${{ hashFiles('DEPS') }}-${{ hashFiles('vendor.json') }}-${{ hashFiles('test/baseline/version.json') }}

      - name: Job Failed
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: win_vulkan_result
          path: result

      - uses: actions/upload-artifact@v4
        with:
          name: win_vulkan_result
          path: result
