  win-vulkan:
    name: win (vulkan-swiftshader)
    runs-on: windows-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Get Third-Party Cache
        id: third-party-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            third_party
            test/baseline/.cache/vulkan-swiftshader
          key: autotest-win-vulkan-${{ hashFiles('DEPS') }}-${{ hashFiles('vendor.json') }}-${{ hashFiles('test/baseline/version.json') }}
          restore-keys: autotest-win-vulkan-

      - name: Run depsync
        run: |
          npm install depsync -g
          depsync
        shell: bash

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Run Autotest
        run: autotest.bat USE_VULKAN_SWIFTSHADER
        shell: cmd
        env:
          TRACY_NO_INVARIANT_CHECK: 1

      - name: Save Third-Party Cache
        if: ${{ (github.event_name == 'push') && (steps.third-party-cache.outputs.cache-hit != 'true') }}
        uses: actions/cache/save@v4
        with:
          path: |
            third_party
            test/baseline/.cache/vulkan-swiftshader
          key: autotest-win-vulkan-${{ hashFiles('DEPS') }}-${{ hashFiles('vendor.json') }}-${{ hashFiles('test/baseline/version.json') }}

      - name: Upload Result
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: win_vulkan_result
          path: result
